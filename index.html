<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wordly</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;background:#f0f4f8;padding:30px 16px;color:#2c3e50}
header{text-align:center;margin-bottom:28px}header h1{font-size:2rem}header p{color:#888;margin-top:5px;font-size:.9rem}
.search-area{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
input{padding:11px 15px;width:300px;font-size:15px;border:2px solid #ccc;border-radius:8px;outline:none;transition:.2s}input:focus{border-color:#2c3e50}
button{padding:11px 22px;font-size:15px;background:#2c3e50;color:#fff;border:none;border-radius:8px;cursor:pointer;transition:.2s}button:hover{background:#1a252f}
#err{max-width:620px;margin:0 auto 14px;padding:10px 14px;background:#fdecea;border:1px solid #f5c6cb;border-radius:8px;color:#c0392b;font-size:14px;display:none}
#res{max-width:620px;margin:0 auto;background:#fff;border-radius:12px;padding:26px;box-shadow:0 4px 16px rgba(0,0,0,.09);display:none;animation:pop .3s ease}
@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.row{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px}
h2{font-size:1.9rem;text-transform:capitalize}
#abtn{padding:7px 15px;font-size:13px;background:#27ae60;border-radius:6px;display:none}#abtn:hover{background:#1e8449}
.ph{color:#999;font-style:italic;margin:4px 0 14px;font-size:.95rem}
.pos{display:inline-block;background:#2c3e50;color:#fff;padding:4px 13px;border-radius:20px;font-size:13px;font-style:italic;margin-bottom:11px}
.def{padding:8px 0 8px 12px;border-left:3px solid #eef2f7;margin-bottom:8px;line-height:1.6;font-size:15px}
.ex{color:#999;font-style:italic;font-size:13px;margin-top:3px}
.tags{margin:10px 0 4px}
.tags strong{font-size:13px;color:#666}
.syn,.ant{display:inline-block;padding:3px 11px;border-radius:20px;font-size:13px;margin:3px;cursor:pointer;transition:.15s}
.syn{background:#eaf0fb;border:1px solid #b0c4de;color:#2c3e50}.syn:hover{background:#2c3e50;color:#fff}
.ant{background:#fdecea;border:1px solid #f5c6cb;color:#c0392b}.ant:hover{background:#c0392b;color:#fff}
hr{border:none;border-top:1px solid #ecf0f1;margin:18px 0}
</style>
</head>
<body>
<header><h1>📖 Wordly</h1><p>Your friendly pocket dictionary — just type a word.</p></header>
<div class="search-area">
  <input id="wi" placeholder="e.g. serendipity..." autocomplete="off" onkeydown="if(event.key==='Enter')lookup()"/>
  <button onclick="lookup()">Search</button>
</div>
<p id="err"></p>
<div id="res">
  <div class="row"><h2 id="wt"></h2><button id="abtn" onclick="new Audio(au).play()">🔊 Pronounce</button></div>
  <p class="ph" id="ph"></p>
  <div id="mn"></div>
</div>
<script>
let au="";

function lookup(){
  let w=document.getElementById("wi").value.trim();
  if(!w){err("Hmm, looks like you forgot to type a word!");return;}
  err(""); document.getElementById("res").style.display="none";
  fetch("https://api.dictionaryapi.dev/api/v2/entries/en/"+encodeURIComponent(w))
    .then(r=>r.ok?r.json():Promise.reject())
    .then(d=>show(d[0]))
    .catch(()=>err(`We couldn't find "${w}" — maybe check the spelling?`));
}

function show(d){
  document.getElementById("wt").textContent=d.word;
  document.getElementById("ph").textContent=d.phonetic||"";
  au=""; document.getElementById("abtn").style.display="none";
  (d.phonetics||[]).find(p=>p.audio&&(au=p.audio)&&(document.getElementById("abtn").style.display="inline-block"));
  let m=document.getElementById("mn"); m.innerHTML="";
  (d.meanings||[]).forEach((mg,i)=>{
    if(i) m.innerHTML+="<hr>";
    m.innerHTML+=`<span class="pos">${mg.partOfSpeech}</span>`;
    mg.definitions.slice(0,3).forEach((df,j)=>
      m.innerHTML+=`<div class="def"><strong>${j+1}.</strong> ${df.definition}${df.example?`<p class="ex">📌 "${df.example}"</p>`:""}</div>`);
    if(mg.synonyms?.length) m.innerHTML+=`<div class="tags"><strong>Synonyms:</strong> ${mg.synonyms.slice(0,6).map(s=>`<span class="syn" onclick="jump('${s.replace(/'/g,"\\'")}')"> ${s}</span>`).join("")}</div>`;
    if(mg.antonyms?.length) m.innerHTML+=`<div class="tags"><strong>Antonyms:</strong> ${mg.antonyms.slice(0,6).map(a=>`<span class="ant" onclick="jump('${a.replace(/'/g,"\\'")}')"> ${a}</span>`).join("")}</div>`;
  });
  document.getElementById("res").style.display="block";
  document.getElementById("res").scrollIntoView({behavior:"smooth"});
}

function jump(w){document.getElementById("wi").value=w; scrollTo({top:0,behavior:"smooth"}); lookup();}
function err(msg){let e=document.getElementById("err"); e.textContent=msg; e.style.display=msg?"block":"none";}
</script>
</body>
</html>
