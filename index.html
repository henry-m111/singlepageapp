<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wordly - Dictionary App</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main>
      <header>
        <h1>Wordly</h1>
        <p>Look up any English word in seconds.</p>
      </header>

      <section aria-label="Word search">
        <form id="search-form">
          <input
            type="text"
            id="word-input"
            placeholder="Enter a word..."
            autocomplete="off"
          />
          <button type="submit">Search</button>
        </form>
      </section>

      <section id="result-container" aria-live="polite"></section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
