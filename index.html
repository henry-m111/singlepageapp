
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wordly - Dictionary App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f4f8;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #2c3e50;
    }

    .search-area {
      text-align: center;
      margin: 20px 0;
    }

    #wordInput {
      padding: 10px;
      width: 280px;
      font-size: 16px;
      border: 2px solid #2c3e50;
      border-radius: 5px;
    }

    #searchBtn {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #2c3e50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-left: 8px;
    }

    #searchBtn:hover {
      background-color: #1a252f;
    }

    #error {
      text-align: center;
      color: red;
      font-size: 15px;
      margin-top: 10px;
      display: none;
    }

    #result {
      max-width: 600px;
      margin: 30px auto;
      background-color: white;
      border-radius: 8px;
      padding: 25px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      display: none;
    }

    #result h2 {
      color: #2c3e50;
      font-size: 28px;
      margin-bottom: 5px;
    }

    .phonetic {
      color: gray;
      font-style: italic;
      margin-bottom: 10px;
    }

    .part-of-speech {
      display: inline-block;
      background-color: #2c3e50;
      color: white;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .definition {
      margin-bottom: 10px;
      line-height: 1.6;
    }

    .example {
      color: #555;
      font-style: italic;
      margin-left: 15px;
      margin-bottom: 8px;
    }

    .synonyms {
      margin-top: 12px;
      font-size: 14px;
    }

    .syn-tag {
      display: inline-block;
      background-color: #eaf0fb;
      border: 1px solid #b0c4de;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 13px;
      margin: 3px;
      cursor: pointer;
    }

    .syn-tag:hover {
      background-color: #2c3e50;
      color: white;
    }

    hr {
      border: none;
      border-top: 1px solid #eee;
      margin: 20px 0;
    }

    #audioBtn {
      padding: 6px 14px;
      font-size: 14px;
      background-color: #27ae60;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-bottom: 15px;
      display: none;
    }

    #audioBtn:hover {
      background-color: #1e8449;
    }
  </style>
</head>
<body>

  <h1>📖 Wordly Dictionary</h1>

  <div class="search-area">
    <input type="text" id="wordInput" placeholder="Search a word..." />
    <button id="searchBtn">Search</button>
  </div>

  <p id="error"></p>

  <div id="result">
    <h2 id="wordTitle"></h2>
    <p class="phonetic" id="phonetic"></p>
    <button id="audioBtn" onclick="playAudio()">🔊 Pronounce</button>
    <div id="meanings"></div>
  </div>
