<!DOCTYPE html>
<html>
<head>
  <title>Wordly Dictionary</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
      background-color: #f4f4f4;
    }

    input, button {
      padding: 10px;
      margin: 5px;
    }

    #result {
      margin-top: 20px;
      padding: 15px;
      background: white;
      display: inline-block;
      border-radius: 8px;
    }

    #error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <h1>📘 Wordly Dictionary</h1>

  <form id="form">
    <input type="text" id="wordInput" placeholder="Enter a word">
    <button type="submit">Search</button>
  </form>

  <div id="error"></div>

  <div id="result">
    <h2 id="word"></h2>
    <p id="partOfSpeech"></p>
    <p id="definition"></p>
    <p id="example"></p>
    <p id="synonyms"></p>

    <audio id="audio" controls></audio>
  </div>

  <script src="app.js"></script>

</body>
</html>
