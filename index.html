<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wordly - Dictionary App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f5f5f5;
    }

    h1 { text-align: center; color: #333; }

    .search-area {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover { background: #357abd; }

    #result {
      background: white;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #ddd;
      display: none;
    }

    #error { color: red; display: none; }

    .word { font-size: 28px; font-weight: bold; }
    .phonetic { color: gray; font-style: italic; }
    .part-of-speech { color: #4a90e2; font-weight: bold; margin-top: 10px; }
    .definition { margin: 5px 0 5px 15px; }
    .example { color: gray; font-style: italic; margin-left: 15px; }
    .synonyms { margin-top: 10px; color: #555; }
  </style>
</head>
<body>

  <h1>Wordly Dictionary</h1>

  <div class="search-area">
    <input type="text" id="wordInput" placeholder="Search a word..." />
    <button onclick="searchWord()">Search</button>
  </div>

  <p id="error">Word not found. Please try another word.</p>

  <div id="result">
    <p class="word" id="wordTitle"></p>
    <p class="phonetic" id="phonetic"></p>
    <div id="meanings"></div>
    <p id="audioSection"></p>
  </div>

  <script>
    async function searchWord() {
      const word = document.getElementById("wordInput").value.trim();

      // Hide previous results
      document.getElementById("result").style.display = "none";
      document.getElementById("error").style.display = "none";

      if (!word) return;

      try {
        const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);

        if (!response.ok) {
          document.getElementById("error").style.display = "block";
          return;
        }

        const data = await response.json();
        displayResult(data[0]);

      } catch (error) {
        document.getElementById("error").textContent = "Something went wrong. Check your connection.";
        document.getElementById("error").style.display = "block";
      }
    }

    function displayResult(entry) {
      // Word and phonetic
      document.getElementById("wordTitle").textContent = entry.word;
      document.getElementById("phonetic").textContent = entry.phonetic || "";

      // Meanings
      let meaningsHTML = "";
      entry.meanings.forEach(function(meaning) {
        meaningsHTML += `<p class="part-of-speech">${meaning.partOfSpeech}</p>`;

        const def = meaning.definitions[0];
        meaningsHTML += `<p class="definition">${def.definition}</p>`;

        if (def.example) {
          meaningsHTML += `<p class="example">"${def.example}"</p>`;
        }

        if (meaning.synonyms.length > 0) {
          meaningsHTML += `<p class="synonyms">Synonyms: ${meaning.synonyms.slice(0, 5).join(", ")}</p>`;
        }
      });

      document.getElementById("meanings").innerHTML = meaningsHTML;

      // Audio
      const audioEntry = entry.phonetics.find(p => p.audio);
      if (audioEntry) {
        document.getElementById("audioSection").innerHTML =
          `<audio controls src="${audioEntry.audio}">Your browser does not support audio.</audio>`;
      } else {
        document.getElementById("audioSection").innerHTML = "";
      }

      document.getElementById("result").style.display = "block";
    }

    // Allow pressing Enter to search
    document.getElementById("wordInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter") searchWord();
    });
  </script>

</body>
</html>
